root = "."
tmp_dir = "tmp"

[build]
  cmd = "go run ./cmd/server -dev"
  entrypoint = ""
  args = []
  watch_dir = ["."]
  exclude_dir = ["tmp", ".git", "node_modules"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_file = []
  delay = 1000
  stop_on_error = true

[log]
  time = true
  level = "info"

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[screen]
  clear_on_rebuild = false
