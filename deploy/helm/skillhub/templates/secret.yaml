apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skillhub.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skillhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT
  jwt-secret: {{ .Values.app.jwtSecret | quote }}

  # PostgreSQL
  db-password: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.password | quote }}{{ else }}{{ .Values.postgresql.external.password | quote }}{{ end }}

  # Redis
  redis-password: {{ if .Values.redis.enabled }}{{ .Values.redis.auth.password | quote }}{{ else }}{{ .Values.redis.external.password | quote }}{{ end }}

  # MinIO
  minio-access-key: {{ if .Values.minio.enabled }}{{ .Values.minio.auth.rootUser | quote }}{{ else }}{{ .Values.minio.external.accessKey | quote }}{{ end }}
  minio-secret-key: {{ if .Values.minio.enabled }}{{ .Values.minio.auth.rootPassword | quote }}{{ else }}{{ .Values.minio.external.secretKey | quote }}{{ end }}

  # LLM
  llm-api-key: {{ .Values.app.llm.apiKey | quote }}
